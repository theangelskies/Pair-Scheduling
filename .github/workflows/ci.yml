name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: appdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install root deps
        run: npm install

      - name: Install frontend deps
        run: npm install
        working-directory: frontend

      - name: Install backend deps
        run: npm install
        working-directory: backend

      - name: Lint
        run: npm run lint

      - name: Run migrations
        run: npm run migrate
        working-directory: backend
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/appdb

      - name: Test frontend
        run: npm run test
        working-directory: frontend

      - name: Test backend
        run: npm run test
        working-directory: backend
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/appdb

      - name: Format check
        run: npm run format:check

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Build backend
        run: npm run build
        working-directory: backend
