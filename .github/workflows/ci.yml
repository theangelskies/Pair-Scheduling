name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install root deps
        run: npm install

      - name: Install frontend deps
        run: npm install
        working-directory: frontend

      - name: Install backend deps
        run: npm install
        working-directory: backend

      - name: Lint
        run: npm run lint

      - name: Test frontend
        run: npm run test
        working-directory: frontend

      - name: Test backend
        run: npm run test
        working-directory: backend

      - name: Format check
        run: npm run format:check
